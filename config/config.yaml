# Malware Opcode Dataset Configuration

# ============================================
# MALWARE FAMILIES (MalwareBazaar signatures)
# ============================================
# Format: "display_name": "bazaar_signature"
FAMILIES:
  rat: "njRAT"           # Remote Access Trojans
  infostealer: "AgentTesla"   # Infostealers  
  dropper: "GuLoader"         # Droppers & Loaders
  ransomware: "Conti"        # Ransomware
  wiper: "Whisper"           # Wipers (Killware)
  worm: "WannaCry"           # Worms
  virus: "Sality"            # Viruses
  rootkit: "TDL4"            # Rootkits & Bootkits

# Alternative signatures for each family (if primary fails)
FAMILY_ALTERNATIVES:
  rat:
    - "AsyncRAT"
    - "NanoCore"
    - "QuasarRAT"
    - "DarkRAT"
  infostealer:
    - "FormBook"
    - "RedLine"
    - "AZORult"
    - "TrickBot"
  dropper:
    - "Emotet"
    - "Hancitor"
    - "IcedID"
  ransomware:
    - "LockBit"
    - "REvil"
    - "Ryuk"
    - "BlackCat"
  wiper:
    - "HermeticWiper"
    - "Industroyer"
    - "AcidRain"
  worm:
    - "Conficker"
    - "Mirai"
    - "ILOVEYOU"
  virus:
    - "Virut"
    - "Parite"
    - "Expiro"
  rootkit:
    - "ZeroAccess"
    - "Rusty"

# ============================================
# SAMPLING CONFIG
# ============================================
SAMPLES_PER_FAMILY: 10000
BENIGN_SAMPLES: 10000

# ============================================
# MALWAREBAZAAR API
# ============================================
MALWAREBAZAAR_API_KEY: "MALWAREBAZZAR_API_KEY"
MALWAREBAZAAR_API_URL: "https://mb-api.abuse.ch/api/v1/"
DAILY_DOWNLOAD_LIMIT: 10000
ZIP_PASSWORD: "infected"

# ============================================
# VIRUSSHARE (for benign)
# ============================================
# Benign filtering: files with < 3 VirusTotal detections
VIRUSSHARE_BENIGN_THRESHOLD: 3

# ============================================
# EXTRACTION CONFIG
# ============================================
ARCHITECTURES:
  - "x86"    # 32-bit
  - "x64"    # 64-bit

# Opcode extraction mode
# Options: "raw_bytes", "mnemonics", "full_disasm"
EXTRACTION_MODE: "raw_bytes"

# Capstone mode (CS_MODE_32 or CS_MODE_64)
CAPSTONE_MODE: "auto"  # auto-detect from PE

# ============================================
# STORAGE CONFIG
# ============================================
DATABASE_PATH: "data/dataset.db"
MALWARE_DIR: "data/malware"
BENIGN_DIR: "data/benign"
OPCODES_DIR: "data/opcodes"

# Database settings
DB_ECHO: false

# ============================================
# LOGGING
# ============================================
LOG_LEVEL: "INFO"
LOG_DIR: "logs"

# ============================================
# TELEGRAM NOTIFICATIONS (Optional)
# ============================================
# Get token from @BotFather, chat_id from @userinfobot
TELEGRAM_BOT_TOKEN: "TELEGRAM-BOT-TOKEN-ID"
TELEGRAM_CHAT_ID: "CHAT-ID"
NOTIFY_EVERY_N_SAMPLES: 100
